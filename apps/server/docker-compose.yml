services:
  db:
    image: mysql:latest
    container_name: mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_DATABASE: 'mydb'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'password'

    ports:
      - "3306:3306"
    volumes:
      - ~/mysql/data:/var/lib/mysql