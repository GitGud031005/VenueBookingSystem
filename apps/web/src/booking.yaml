    patch:
      operationId: PaymentController_updateApply
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplyDto'
      responses:
        '200':
          description: Discount updated successfully
        '401':
          description: Unauthorized
      security:
        - JWT-auth: []
