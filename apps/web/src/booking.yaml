            type: string
      responses:
        '200':
          description: Invoice data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceCreateDataResponseDto'
        '401':
          description: Unauthorized
        '404':
          description: Order not found
      security:
        - JWT-auth: []
      summary: Get invoice creation data for an order
      tags: *ref_6
  /payment/invoices:
    post:
      operationId: PaymentController_createInvoice
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceDto'
      responses:
        '201':
          description: Invoice created successfully
        '400':
          description: Invalid input data
      summary: Create an invoice for an order
      tags: &ref_7
        - Payments
  /payment/invoices/complete:
    patch:
      operationId: PaymentController_completeInvoicePayment
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteInvoicePaymentDto'
      responses:
        '200':
          description: Invoice payment completed successfully
        '404':
          description: Invoice not found
