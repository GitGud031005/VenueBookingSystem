info:
  title: Venue Booking System API
  description: >-
    API documentation for the Venue Booking System - manage locations, venues,
    bookings, and payments
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    JWT-auth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT
      description: Enter JWT token
      in: header
  schemas:
    SignupDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
          description: User email address
        password:
          type: string
          example: SecurePass123
          description: User password
        lastName:
          type: string
          example: Nguyen
          description: User last name
        firstName:
          type: string
          example: Van A
          description: User first name
        DoB:
          type: string
          example: '1990-01-15'
          description: Date of birth (YYYY-MM-DD)
      required:
        - email
        - password
        - lastName
        - firstName
        - DoB
    OwnerSignupDto:
      type: object
      properties:
        bankId:
          type: string
          example: VCB
          description: Bank ID code
        bankName:
          type: string
          example: Vietcombank
          description: Bank name
        accountName:
          type: string
          example: NGUYEN VAN A
          description: Account holder name
        accountNumber:
          type: string
          example: '1234567890'
          description: Bank account number
      required:
        - bankId
        - bankName
        - accountName
        - accountNumber
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
          description: User email address
        password:
          type: string
          example: SecurePass123
          description: User password
      required:
        - email
        - password
    UpdateUserDto:
      type: object
      properties:
        firstName:
          type: string
          example: Van A
          description: User first name
        lastName:
          type: string
          example: Nguyen
          description: User last name
        phoneNumber:
          type: string
          example: '+84987654321'
          description: Phone number
        avatar:
          type: string
          example: https://example.com/avatar.jpg
          description: Avatar URL
        dob:
          type: string
          example: '1990-01-15'
          description: Date of birth (YYYY-MM-DD)
    UserProfileDto:
      type: object
      properties:
        id:
          type: string
          example: a1b2c3d4-e5f6-7890-1234-567890abcdef
          description: User ID
        email:
          type: string
          example: user@example.com
          description: User email
        firstName:
          type: string
          example: Van A
          description: First name
        lastName:
          type: string
          example: Nguyen
          description: Last name
        phoneNo:
          type: string
          nullable: true
          example: '+84987654321'
          description: Phone number
        avatarURL:
          type: string
          nullable: true
          example: https://example.com/avatar.jpg
          description: Avatar URL
        DoB:
          format: date-time
          type: string
          example: '1990-01-15'
          description: Date of birth
        isActive:
          type: number
          example: 1
          description: Is active status
        isAdmin:
          type: number
          example: 0
          description: Is admin status
        createdAt:
          format: date-time
          type: string
          example: '2023-01-01T00:00:00.000Z'
          description: Created at
        updatedAt:
          format: date-time
          type: string
          example: '2023-01-01T00:00:00.000Z'
          description: Updated at
      required:
        - id
        - email
        - firstName
        - lastName
        - DoB
        - isActive
        - isAdmin
        - createdAt
        - updatedAt
    UpdateOwnerDto:
      type: object
      properties:
        bankId:
          type: string
          example: VCB
          description: Bank ID code
        bankName:
          type: string
          example: Vietcombank
          description: Bank name
        accountName:
          type: string
          example: NGUYEN VAN A
          description: Account holder name
        accountNo:
          type: string
          example: '1234567890'
          description: Bank account number
      required:
        - bankId
        - bankName
        - accountName
        - accountNo
    CreateVenueTypeDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        minCapacity:
          type: number
          minimum: 1
        maxCapacity:
          type: number
          minimum: 1
      required:
        - name
        - minCapacity
        - maxCapacity
    UpdateVenueTypeDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        minCapacity:
          type: number
          minimum: 1
        maxCapacity:
          type: number
          minimum: 1
