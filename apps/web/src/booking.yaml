      tags: *ref_7
  /payment/webhook:
    patch:
      operationId: PaymentController_webhookUpdateOrderStatus
      parameters: []
      responses:
        '200':
          description: Order status updated successfully
      summary: Webhook to update order status
      tags: *ref_7
  /payment/invoices/status:
    patch:
      operationId: PaymentController_updateInvoiceStatus
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceStatusDto'
      responses:
        '200':
          description: Invoice status updated successfully
        '404':
          description: Invoice not found
      summary: Update invoice payment status
      tags: *ref_7
  /payment/discounts:
    post:
      operationId: PaymentController_createDiscount
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscountDto'
      responses:
        '201':
          description: Discount created successfully
        '403':
          description: Forbidden - Admin role required
      security:
        - JWT-auth: []
      summary: Create a new discount code (Admin only)
      tags: *ref_7
  /payment/discounts/{id}:
    patch:
      operationId: PaymentController_updateDiscount
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDiscountDto'
      responses:
        '200':
          description: Discount updated successfully
        '403':
          description: Forbidden - Admin role required
        '404':
          description: Discount not found
      security:
        - JWT-auth: []
      summary: Update discount details (Admin only)
      tags: *ref_7
    delete:
      operationId: PaymentController_deleteDiscount
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Discount deleted successfully
        '403':
          description: Forbidden - Admin role required
        '404':
          description: Discount not found
      security:
        - JWT-auth: []
      summary: Delete a discount (Admin only)
      tags: *ref_7
  /payment/applies:
    post:
      operationId: PaymentController_applyDiscount
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplyDto'
      responses:
        '201':
          description: Discount applied successfully
        '401':
          description: Unauthorized
      security:
